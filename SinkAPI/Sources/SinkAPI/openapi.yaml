info:
  contact: {}
  description: |-
    Curated internet radio API for SINK FM web, mobile web, and native clients.
    Playback URLs are short-lived signed redirects. Native clients should refresh playback before the returned expires_at timestamp and re-resolve after network interruption.
    Now-playing metadata is available through cached snapshot reads. Clients should poll every 15-30 seconds; the legacy SSE endpoint is retired.
    Pre-login station browsing requires an anonymous session issued by POST /anonymous-sessions and sent as X-Anonymous-Session.
    Sensitive account operations may require sudo re-authentication through POST /auth/sudo.
  title: SINK FM Backend API
  version: 0.1.0
openapi: 3.0.3
paths:
  /health:
    get:
      description: Checks API and database reachability for platform probes and monitoring.
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_handler.HealthResponse'
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/internal_handler.HealthResponse'
          description: Service Unavailable
      summary: Get API health
      tags:
      - system
  /openapi.json:
    get:
      description: Returns the generated OpenAPI 3.0 JSON document for the backend
        API.
      operationId: getOpenapiJson
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: Get OpenAPI document
      tags:
      - system
  /openapi.yaml:
    get:
      description: Returns the generated OpenAPI 3.0 YAML document for the backend
        API. Used by Swift OpenAPI Generator and other tooling that requires YAML
        input.
      operationId: getOpenapiYaml
      responses:
        "200":
          content:
            application/yaml:
              schema:
                type: string
          description: OK
      summary: Get OpenAPI YAML document
      tags:
      - system
  /ping:
    get:
      description: Returns a lightweight reachability response without checking dependencies.
      operationId: getPing
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_marko-stanojevic_project-ostgut_backend_internal_handler_responses.NeutralMessage'
          description: OK
      summary: Ping API
      tags:
      - system
  /swagger.json:
    get:
      description: Returns the generated Swagger 2.0 JSON document for the Swagger
        UI and legacy tooling.
      operationId: getSwaggerJson
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: Get Swagger document
      tags:
      - system
  /v1/admin/audit-events:
    get:
      description: Returns privileged audit events with optional action filtering.
      operationId: getV1AdminAuditEvents
      parameters:
      - description: Page size
        in: query
        name: limit
        schema:
          type: integer
      - description: Page offset
        in: query
        name: offset
        schema:
          type: integer
      - description: Audit action filter
        in: query
        name: action
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_marko-stanojevic_project-ostgut_backend_internal_handler_responses.AdminAuditEventCollection'
          description: OK
        "401":
          content:
