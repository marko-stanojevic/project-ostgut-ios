included:
  - Sink
  - SinkMac
  - SinkAPI/Sources
  - SinkPlayback/Sources

excluded:
  - Sink/.build
  - SinkAPI/.build
  - SinkPlayback/.build
  - DerivedData

disabled_rules:
  - trailing_whitespace   # Xcode auto-formatter handles this

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 800
